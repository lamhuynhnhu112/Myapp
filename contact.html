<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Lumi App - Contact Us</title>
    <style>
        body { background-color: #fdfcf0; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #fff; padding: 40px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); width: 350px; text-align: center; }
        h2 { color: #88d8b0; margin-bottom: 25px; }
        input, select, textarea { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #eee; border-radius: 10px; box-sizing: border-box; outline: none; background: #fafafa; font-family: inherit; }
        .btn { width: 100%; padding: 12px; background: #c1f0d0; border: none; border-radius: 10px; color: #55a873; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .link { margin-top: 20px; font-size: 13px; color: #ccc; }
        .link a { color: #88d8b0; text-decoration: none; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Contact Us</h2>
        <form action="#">
            <input type="text" placeholder="Your Name" required>
            <select>
                <option value="feedback">General Feedback</option>
                <option value="complaint">Complaint / Help</option>
            </select>
            <textarea rows="4" placeholder="How can we help you?"></textarea>
            <button type="submit" class="btn">Send Message</button>
        </form>
        <div class="link">Go back to <a href="index.html">Login</a></div>
    </div>
</body>
</html>
