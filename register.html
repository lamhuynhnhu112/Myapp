<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Lumi App - Register</title>
    <style>
        body { background-color: #fdfcf0; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #fff; padding: 40px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); width: 350px; }
        h2 { color: #b2cefe; text-align: center; margin-bottom: 25px; }
        label { font-size: 13px; color: #999; margin-left: 5px; }
        input { width: 100%; padding: 12px; margin: 8px 0 18px; border: 1px solid #eee; border-radius: 10px; box-sizing: border-box; outline: none; background: #fafafa; }
        .btn { width: 100%; padding: 12px; background: #ffdac1; border: none; border-radius: 10px; color: #b08568; font-weight: bold; cursor: pointer; }
        .link { text-align: center; margin-top: 20px; font-size: 13px; color: #ccc; }
        .link a { color: #b2cefe; text-decoration: none; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Register</h2>
        <form action="#">
            <label>Full Name</label>
            <input type="text" placeholder="Your name" required>
            <label>Email Address</label>
            <input type="email" placeholder="email@example.com" required style="width: 100%; padding: 12px; margin: 8px 0 18px; border: 1px solid #eee; border-radius: 10px; box-sizing: border-box;">
            <label>Password</label>
            <input type="password" placeholder="Create password" required>
            <button type="submit" class="btn">Sign Up</button>
        </form>
        <div class="link">Already have an account? <a href="login.html">Login</a></div>
    </div>
</body>
</html>
